# Keep heap/metaspace modest so the OS OOM killer does not kill the Gradle daemon
# (8G+4G was causing "daemon disappeared" on typical 8–16GB laptops).
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
